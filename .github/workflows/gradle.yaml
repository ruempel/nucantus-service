name: gradle test
on:
  push:
    branches:
      - main
  workflow_dispatch: # enables "Run workflow" button
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '26'
          distribution: 'temurin'
          cache: gradle
      - uses: gradle/actions/setup-gradle@v6
      - run: ./gradlew test